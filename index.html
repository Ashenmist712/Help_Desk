<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="public/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="public/css/menu.css" />
    <title>Help Desk</title>
  </head>

  <body>
    <div class="wrapper fadeInDown">
      <div id="formContent">
        <!-- Tabs Titles -->

        <!-- Icon -->
        <div class="fadeIn first">
          <img src="public/img/logo.png" id="icon" alt="User Icon" />
          <h1>Help Desk</h1>
        </div>

        <!-- Login Form -->
        <form id="frmLogin" method="post" onsubmit="return loginUsuario();">
          <input
            type="text"
            id="login"
            class="fadeIn second"
            name="login"
            placeholder="usuario"
            required
          />
          <input
            type="password"
            id="password"
            class="fadeIn third"
            name="password"
            placeholder="password"
            required
          />
          <input type="submit" class="fadeIn fourth" value="Entrar" />
        </form>

        <!-- Remind Passowrd -->
        <div id="formFooter">
          <a
            class="underlineHover"
            href="#"
            data-toggle="modal"
            data-target="#modalContacto"
            >Contactar con el administrador</a
          >
        </div>
      </div>
    </div>

    <!-- The Modal -->
    <div class="modal" id="modalContacto">
      <div class="modal-dialog">
        <div class="modal-content">
          <!-- Modal Header -->
          <div class="modal-header">
            <h4 class="modal-title">Contacto</h4>
            <button type="button" class="close" data-dismiss="modal">
              &times;
            </button>
          </div>

          <!-- Modal body -->
          <div class="modal-body">
            Si no tienes una credencial contactar al: 5678439012.
          </div>

          <!-- Modal footer -->
          <div class="modal-footer">
            <button type="button" class="btn btn-danger" data-dismiss="modal">
              Cerrar
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="public/jquery/jquery-3.6.0.min.js"></script>
    <script src="public/bootstrap/popper.min.js"></script>
    <script src="public/bootstrap/bootstrap.min.js"></script>
    <script src="public/js/usuarios/login.js?v=1"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
